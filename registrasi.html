<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Wajah — Meliana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/app.js"></script>
</head>
<body data-page="registrasi">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><span class="brand-icon">📷</span><div><strong>Meliana</strong><small>Absensi Wajah</small></div></div>
      <nav class="nav">
        <a href="index.html" class="nav-link" data-page="dashboard"><span>🏠</span> Dashboard</a>
        <a href="absensi.html" class="nav-link" data-page="absensi"><span>✅</span> Absensi</a>
        <a href="registrasi.html" class="nav-link active" data-page="registrasi"><span>👤</span> Daftar Wajah</a>
        <a href="riwayat.html" class="nav-link" data-page="riwayat"><span>📋</span> Riwayat</a>
        <a href="karyawan.html" class="nav-link" data-page="karyawan"><span>👥</span> Karyawan</a>
      </nav>
      <p class="sidebar-note">Izinkan kamera (HTTPS atau localhost).</p>
    </aside>
    <main class="main-content">
      <div class="page-header">
        <h1>Daftar Wajah Karyawan</h1>
        <p>Registrasi wajah baru untuk sistem absensi</p>
      </div>
      <div id="alert-box" class="alert alert-info">Memuat...</div>
      <div class="grid-2">
        <div>
          <form id="form-registrasi">
            <div class="form-group">
              <label for="nip">NIP / ID Karyawan</label>
              <input type="text" id="nip" name="nip" required placeholder="Contoh: EMP001">
            </div>
            <div class="form-group">
              <label for="nama">Nama Lengkap</label>
              <input type="text" id="nama" name="nama" required placeholder="Nama karyawan">
            </div>
            <div class="form-group">
              <label for="jabatan">Jabatan (opsional)</label>
              <input type="text" id="jabatan" name="jabatan" placeholder="Staff / Admin">
            </div>
            <p style="font-size: 0.85rem; color: var(--muted); margin-bottom: 0.5rem;">Ambil 3 sampel wajah (hadap depan):</p>
            <div class="progress-steps" id="step-dots"></div>
            <button type="submit" id="btn-submit" class="btn btn-primary" disabled>Simpan Pendaftaran</button>
          </form>
        </div>
        <div>
          <div class="camera-panel">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="overlay"></canvas>
            <div id="camera-status" class="camera-status">Tunggu model siap...</div>
          </div>
          <div class="btn-group">
            <button type="button" id="btn-camera" class="btn btn-secondary">Nyalakan Kamera</button>
            <button type="button" id="btn-capture" class="btn btn-primary" disabled>Ambil Sampel Wajah</button>
          </div>
        </div>
      </div>
      <div id="loader" class="loader-overlay hidden"><div class="spinner"></div><p>Memuat...</p></div>
    </main>
  </div>
  <script src="assets/js/data-store.js"></script>
  <script src="assets/js/face-loader.js"></script>
  <script src="assets/js/registrasi.js"></script>
</body>
</html>
